services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: financeiro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatorio}
      POSTGRES_DB: financeiro
    volumes:
      - pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financeiro -d financeiro"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://financeiro:${POSTGRES_PASSWORD}@db:5432/financeiro
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET obrigatorio}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      PORT: 3001
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    environment:
      SITE_ADDRESS: :80
    ports:
      - "127.0.0.1:${WEB_PORT:-8081}:80"
    depends_on:
      - api

volumes:
  pg: {}
