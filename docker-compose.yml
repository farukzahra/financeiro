services:
  # Postgres opcional via Docker. Em dev local, o padrao e usar o Postgres
  # externo (localhost:5432) configurado em apps/api/.env.
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: financeiro
      POSTGRES_PASSWORD: financeiro
      POSTGRES_DB: financeiro
    ports:
      - "5433:5432"
    volumes:
      - pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financeiro -d financeiro"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg: {}
