name: Deploy VPS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST || vars.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER || vars.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || vars.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH }}
          DEPLOY_REF: origin/${{ github.ref_name }}
        run: |
          set -eu
          : "${VPS_HOST:?Configure VPS_HOST in repository secrets or variables}"
          : "${VPS_SSH_KEY:?Configure VPS_SSH_KEY in repository secrets}"

          USER="${VPS_USER:-root}"
          PORT="${VPS_PORT:-22}"
          APP_DIR="${DEPLOY_PATH:-/opt/financeiro}"

          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -i ~/.ssh/deploy_key \
            -p "$PORT" \
            -o StrictHostKeyChecking=accept-new \
            "$USER@$VPS_HOST" \
            "APP_DIR='$APP_DIR' DEPLOY_REF='$DEPLOY_REF' sh '$APP_DIR/scripts/deploy-vps.sh'"
